name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # oder dein Haupt-Branch Name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cards-words-gaps/package.json

      - name: Install dependencies
        run: |
          cd cards-words-gaps
          npm install

      - name: Build
        run: |
          cd cards-words-gaps
          npm run build:prod

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: cards-words-gaps/dist/cards-words-gaps
          branch: gh-pages
